<!DOCTYPE html>
<html>

<head>
    <title>API Key Check</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
            background-color: #cccccc;
        }
    </style>
</head>

<body>

    <h3>If you see a map below, your API key is WORKING.</h3>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDlIaBUm74EBURy4Ehxs5pu2HASKVeECZ8&callback=initMap"
        async defer></script>

    <script>
        let map;
        let marker; // store marker globally

        function initMap() {
            const initialPos = { lat: 40.7128, lng: -74.006 };

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: initialPos,
            });

            // Listen for click events on map
            map.addListener("click", (event) => {
                const lat = event.latLng.lat();
                const lng = event.latLng.lng();

                placeMarker(event.latLng);

                console.log("Latitude:", lat);
                console.log("Longitude:", lng);

                alert(`Latitude: ${lat}\nLongitude: ${lng}`);
            });
        }

        function placeMarker(location) {
            if (marker) {
                // Move existing marker
                marker.setPosition(location);
            } else {
                // Create new marker
                marker = new google.maps.Marker({
                    position: location,
                    map: map,
                });
            }
        }
    </script>

</body>

</html>
